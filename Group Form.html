<html>
    <head>
        <title>Replit</title>
    </head>
    <body>
        <form>
            <fieldset>
                <!--The fieldet dag is used to grouprelated elements ina formand draws a box around them-->
                <legend>Personal Information</legend>
                <label>Full Name:</label>
                <!--placehoder attribute can be used to provide extra information about entry to be made-->
                <input type="text" id="fname" placeholder="Enter your full name"><br><br>
                <label>Email ID:</label>
                <input type="text" id="email"><br><br>
                <label>Gender:</label><br>
                <input type="radio" id="gender" value="female">Female<br>
                <input type="radio" id="gender" value="male">Male<br><br>
                <label>Birthday:</label><br>
                <input type="date" id="birthday" name="birthday"><br><br>
            </fieldset>
        </form>
    </body>
</html>
