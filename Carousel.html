<!DOCTYPE html>

<html lang="en">

<head>

    <title>Bootstrap Example</title>

    <meta charset="utf-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

    <style>
        body {
 margin: 0;
}
.navbar {
 position: fixed; /* Keeps it in place */
 top: 0; /* Aligns it to the top */
 width: 100%; /* Full width */
 background-color: #333;
 overflow: hidden;
 z-index: 9999; /* Ensures it stays above other elements */
}
.navbar a {
 float: left;
 display: block;
 color: white;
 text-align: center;
 padding: 14px 20px;
 text-decoration: none;
}
.navbar a:hover {
 background-color: #ddd;
 color: black;
}
content {
 padding: 20px;
 margin-top: 50px; /* Prevents content from hiding behind navbar */
}
        
    </style>

</head>

<body>
    <nav class="navbar">
    
        <ul>
            <li><a href="https://en.wikipedia.org/wiki/Main_Page" target="_blank">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#posts">Posts</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
    

    <div class="container">
        <h2>Carousel Example</h2>
        <div id="myCarousel" class="carousel slide" data-ride="carousel">
        
            <!-- Indicators -->
            <ol class="carousel-indicators">
                <li data-target="#myCarousel" data-slide-to="0" class="active"></li>
                <li data-target="#myCarousel" data-slide-to="1"></li>
                <li data-target="#myCarousel" data-slide-to="2"></li>
            </ol>

            <!-- Wrapper for slides -->
            <div class="carousel-inner">
                <div class="item active">
                    <img src="Ball.jpg" alt="Image 1" style="width:100%;">
                </div>

                <div class="item">
                    <img src="dog image.jpg" alt="Chicago" style="width:100%;">
                </div>

                <div class="item">
                    <img src="Image.jpg" alt="New York" style="width:100%;">
                </div>
            </div>

            <!-- Left and right controls -->
            <a class="left carousel-control" href="#myCarousel" data-slide="prev">
                <span class="glyphicon glyphicon-chevron-left"></span>
                <span class="sr-only">Previous</span>
            </a>
            <a class="right carousel-control" href="#myCarousel" data-slide="next">
                <span class="glyphicon glyphicon-chevron-right"></span>
                <span class="sr-only">Next</span>
            </a>
        </div>
    </div>
</body>
