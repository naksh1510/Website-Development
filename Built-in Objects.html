<html>
    <head>
        <title>JavaScript Math Object Methods</title>
    </head>
    <body>
        <script type="text/javascript">
            var value = Math.abs(20);
            document.write("Demo Test Value value of 20 is: " + value + "<br>");

            var value = Math.acos(-1);
            document.write("Demo Test Value value of -1 is: " + value + "<br>");

            var value = Math.asin(1);
            document.write("Demo Test Value value of 1 is: " + value + "<br>");

            var value = Math.atan(0.5);
            document.write("Demo Test Value value of 0.5 is: " + value + "<br>");
            </script>
    </body>
</html>
