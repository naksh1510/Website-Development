<html>
    <head>
        <title>My Animal Facts</title>
        <style>
            /*Page background-dets the color and font for the whole page*/ body {
            background-color: darkgreen;
            font-family: Arial, sans-serif;
            }

/* Box model- width sets the content area,padding pushes the text away from the the edges, border draws a visible frame around the fact file, and margin pushes the fact fie away from the dcreen edge.*/ .fact-file {
    background-color: lightyellow;
    color: darkslategray;
    width: 260px;
    padding: 25px;
    border: 4px solid forestgreen;
    margin: 30px;
}

/*Animal name- forestgreen color so it stands out*/
.animal-name {
    color: forestgreen;
    font-size: 24px;
}

/*Detail rows- dark text on the light background*/ .detail {
    color: darkslategray;

}

/* Cool fact- orange and italic to make it feel special*/
.cool-fact {
    color: darkorange;
    font-style: italic;
}
        </style>
    </head>

    <div class="fact-file">
        <h2 class="animal-name">Snow Leopard</h2>
        <p class="detail">Type: Big Cat</p>
        <p class="detail">Habitat: Mountainous regions of Central Asia</p>
        <p class="detail">Diet: Deer, goats and wild sheep</p>
        <p class="cool-fact">Cool Fact: Snow leopards can leap up to 15 metres in one jump!</p>
    </div>
</html>
