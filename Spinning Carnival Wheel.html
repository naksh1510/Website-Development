<!DOCTYPE html>

<html>

<head>

    <title>🎡 Carnival Transform!</title>

    <style>
        * {

            box-sizing: border-box;

        }

        body {

            background-color: #fff8dc;

            font-family: "Arial", sans-serif;

            display: flex;

            flex-direction: column;

            align-items: center;

            min-height: 100vh;

            gap: 20px;

        }

        h1 {

            font-size: 36px;

            color: #e63946;

        }

        .carnival-grid {

            display: flex;

            justify-content: center;

            align-items: center;

            gap: 100px;

            flex-wrap: wrap;

        }

        .card {

            background-color: #ffffff;

            border: 3px solid #e63946;

            border-radius: 16px;

            font-size: 52px;

            width: 150px;

            height: 150px;

            display: flex;

            flex-direction: column;

            justify-content: center;

            align-items: center;

            gap: 8px;

        }

        /* 1) Style the card titles.*/
     .card p {
            font-size: 13px;
            color: #555;
        }

        .ferris-wheel {
            transform: rotate(15deg);
        }

        .tent {
            transform: scale(1.2);
        }

        .ticket-booth {
            transform: rotate(-15deg);
        }   
    </style>

</head>

<body>

    <h1>🎪 Welcome to the CSS Carnival! 🎪</h1>

    <p style="font-size:16px; color:#555;">Use <strong>transform</strong> to bring each ride to life!</p>

    <div class="carnival-grid">

        <div class="card ferris-wheel">

            🎡

            <p>Ferris Wheel<br><em>rotate it!</em></p>

        </div>

        <div class="card tent">

            🎪

            <p>Big Top Tent<br><em>scale it up!</em></p>

        </div>

        <div class="card ticket-booth">

            🎫

            <p>Ticket Booth<br><em>rotate it!</em></p>

        </div>

    </div>

</body>

</html>
