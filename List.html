<html>
    <head>
        <meta charset=""utf-8"/>
        <meta name=""viewport" content="width=device-width"/>
        <Title>Lists</Title>

    </head>
    <body>
        <h2>An ordered HTML List:</h2>
        <ol>
            <li>First Item</li>
            <li>Second Item</li>
            <li>Third Item</li>
            <li>Fourth Item</li>

        </ol>
        <h2>An unordered HTML List:</h2>

        <ul>
            <li> Item</li>
            <li> Item</li>
            <li> Item</li>
            <li> Item</li>
        </ul>
        <h2>Definition List:</h2>
        <dl>
            <dt>Tea</dt>
            <dd>- hot drink</dd>

            <dt>Juice</dt>
            <dd>- ice drink</dd>
        </dl>
    </body>
</html>
