<!DOCTYPE html>

<html>

<head>

    <title>🏴‍☠️ Captain Blackbeard's Treasure Map</title>

    <style>
        * {

            box-sizing: border-box;

        }

        body {

            background-color: #d4a96a;

            font-family: "Georgia", serif;

            display: flex;

            justify-content: center;

            align-items: flex-start;

            min-height: 100vh;

            color: #3b2205;

        }

        .map-container {

            background-color: #f5deb3;

            border: 5px solid #5c3d1e;

            border-radius: 10px;

            width: 580px;

            box-shadow: 6px 6px 20px rgba(0, 0, 0, 0.4);

            display: flex;

            flex-direction: column;

            align-items: center;

            gap: 16px;

        }

        hr {

            border: none;

            border-top: 2px dashed #5c3d1e;

            width: 100%;

        }

        .clue-section {

            display: flex;

            flex-direction: column;

            gap: 12px;

            font-size: 20px;

            width: 100%;

            line-height: 1.6;

        }

        /*

1) Style the map title.

*/
.map-title {
    font-size: 32px;
    font-weight: bold;
    letter-spacing: 3px;
    text-transform: uppercase;
}

.fake-location {
    text-decoration: line-through;
}

.real-location {
    font-weight: bold;
    color: #c8a000;
    text-decoration: underline;
}
    </style>

</head>

<body>

    <div class="map-container">

        <p>💀</p>

        <p class="map-title">captain blackbeard's treasure map</p>

        <p style="font-size:14px; color:#7a5230; font-style:italic;">X marks the spot... if you can find it.</p>

        <hr>

        <div class="clue-section">

            <p>❌ <span class="fake-location">Skull Island Cove</span></p>

            <p>❌ <span class="fake-location">The Kraken's Lagoon</span></p>

            <p>✅ <span class="real-location">Devil's Tooth Rock, East Shore</span></p>

        </div>

    </div>

</body>

</html>
