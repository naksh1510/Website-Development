 <html>
    <body>
    <h1>JavaScript Statements</h1>
        
           <p>A javascript program is a list of statements to be executed by a computer.</p>
           <p id="demo"></p>
            <script>
                var x = 5;
                var y = 6;
                var z = x + y;
                document.getElementById("demo").innerHTML = "The sum of x and y is: " + z;
            </script>
    </body>
</html>
