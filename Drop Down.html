<html>
    <head>
        <title>Replit</title>
    </head>
    <body>
        <fieldset>
            <legend><b>Enter Your Marks:</b></legend>
            <Form Action="/actionpage.php"
            oninput="x.value=(parseInt(m1.value)+parseInt(m2.value)+parseInt(m3.value))/3">
            <label>Name:</label></Form>
<input type="text" id="name"><br><br>
            <label>Enter Marks:</label><br>
            <select name="Subject" id="subject">
                <option value="Maths">Maths</option>
                <option value="Science">Science</option>
                <option value="English">English</option>
            </select>
            <input type="number" id="m1" name="m1"><br><br>
            <select name="Subject 2" id="subject">
                <option value="Maths">Maths</option>
                <option value="Science">Science</option>
                <option value="English">English</option>
            </select>
            <input type="number" id="m2" name="m2"><br><br>
            <select name="Subject 3" id="subject">
                <option value="Maths">Maths</option>
                <option value="Science">Science</option>
                <option value="English">English</option>
            </select>
            <input type="number" id="m3" name="m3"><br><br>
            <output name="x" for="m1 m2 m3"></output>
        </form>
        </fieldset>
    </body>
</html>
